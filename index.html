<!DOCTYPE html>
<html>
<head>
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 15px; }
    input, textarea, select { width: 100%; padding: 8px; margin: 5px 0; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top:10px; }
    button { padding: 12px; font-size: 14px; }
  </style>
</head>
<body>

<h2>📅 Daily Tracker</h2>

<label>Date</label>
<input type="date" id="date">

<label>Planned Hours</label>
<input type="number" id="planned" value="3" oninput="update()">

<label>Attended School</label>
<select id="school" onchange="update()">
  <option value="0">No</option>
  <option value="1">Yes</option>
</select>

<label>School Assignment Completed</label>
<select id="assignment" onchange="update()">
  <option value="0">No</option>
  <option value="1">Yes</option>
</select>

<h3>📚 Activities</h3>
<div class="grid">
  <button onclick="add('math')">Math (<span id="math">0</span>h)</button>
  <button onclick="add('science')">Science (<span id="science">0</span>h)</button>
  <button onclick="add('english')">English (<span id="english">0</span>h)</button>
  <button onclick="add('coding')">Coding (<span id="coding">0</span>h)</button>
  <button onclick="add('social')">Social (<span id="social">0</span>h)</button>
  <button onclick="add('music')">Music (<span id="music">0</span>h)</button>
  <button onclick="add('chores')">Chores (<span id="chores">0</span>h)</button>
</div>

<h3>Total Hours: <span id="total">0</span></h3>
<h3>Progress %: <span id="percent">0</span>%</h3>

<label>Notes</label>
<textarea id="notes"></textarea>

<script>
// Store activity hours
let data = {
  math:0, science:0, english:0,
  coding:0, social:0, music:0, chores:0
};

// Add 0.5 hr per click
function add(type){
  data[type] += 0.5;
  document.getElementById(type).innerText = data[type];
  update();
}

// Update totals and %
function update(){
  let activityTotal = Object.values(data).reduce((a,b)=>a+b,0);

  let school = parseInt(document.getElementById("school").value);
  let planned = document.getElementById("planned").value || 3;

  // School = 2 hours
  let total = activityTotal + (school * 2);

  document.getElementById("total").innerText = total;

  let percent = planned > 0 ? (total / planned * 100).toFixed(0) : 0;
  document.getElementById("percent").innerText = percent;
}
</script>

</body>
</html>
