<!DOCTYPE html>
<html>
<head>
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 15px; }
    input, textarea, select { width: 100%; padding: 8px; margin: 5px 0; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top:10px; }
    button { padding: 12px; font-size: 14px; }
  </style>
</head>
<body>

<h2>📅 Daily Tracker</h2>

<label>Date</label>
<input type="date" id="date" onchange="loadDay()">

<label>Planned Hours</label>
<input type="number" id="planned" value="3" oninput="update()">

<label>Attended School</label>
<select id="school" onchange="update()">
  <option value="0">No</option>
  <option value="1">Yes</option>
</select>

<label>School Assignment Completed</label>
<select id="assignment" onchange="update()">
  <option value="0">No</option>
  <option value="1">Yes</option>
</select>

<h3>📚 Activities (tap to add/remove 0.5h)</h3>
<div class="grid">
  <button onclick="toggle('math')">Math (<span id="math">0</span>h)</button>
  <button onclick="toggle('science')">Science (<span id="science">0</span>h)</button>
  <button onclick="toggle('english')">English (<span id="english">0</span>h)</button>
  <button onclick="toggle('coding')">Coding (<span id="coding">0</span>h)</button>
  <button onclick="toggle('social')">Social (<span id="social">0</span>h)</button>
  <button onclick="toggle('music')">Music (<span id="music">0</span>h)</button>
  <button onclick="toggle('chores')">Chores (<span id="chores">0</span>h)</button>
</div>

<h3>Total Hours: <span id="total">0</span></h3>
<h3>Progress: <span id="percent">0</span></h3>

<label>Notes</label>
<textarea id="notes"></textarea>

<br><br>
<button onclick="saveDay()">💾 Save</button>

<script>
let data = {
  math:0, science:0, english:0,
  coding:0, social:0, music:0, chores:0
};

// Default today's date
window.onload = function() {
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("date").value = today;
  loadDay();
};

// Toggle add/remove 0.5
function toggle(type){
  if(data[type] > 0){
    data[type] -= 0.5;
  } else {
    data[type] += 0.5;
  }
  document.getElementById(type).innerText = data[type];
  update();
}

// Update totals
function update(){
  let activityTotal = Object.values(data).reduce((a,b)=>a+b,0);

  let school = parseInt(document.getElementById("school").value);
  let planned = document.getElementById("planned").value || 3;

  let total = activityTotal + (school * 2);
  document.getElementById("total").innerText = total;

  let percent = planned > 0 ? (total / planned * 100).toFixed(0) : 0;
  document.getElementById("percent").innerText = percent;
}

// Save
function saveDay(){
  let date = document.getElementById("date").value;
  if(!date) return;

  let entry = {
    data: data,
    planned: document.getElementById("planned").value,
    school: document.getElementById("school").value,
    assignment: document.getElementById("assignment").value,
    notes: document.getElementById("notes").value
  };

  localStorage.setItem("tracker-" + date, JSON.stringify(entry));
  alert("Saved!");
}

// Load
function loadDay(){
  let date = document.getElementById("date").value;
  if(!date) return;

  let saved = localStorage.getItem("tracker-" + date);

  if(saved){
    let entry = JSON.parse(saved);
    data = entry.data || data;

    for(let key in data){
      document.getElementById(key).innerText = data[key];
    }

    document.getElementById("planned").value = entry.planned || 3;
    document.getElementById("school").value = entry.school || 0;
    document.getElementById("assignment").value = entry.assignment || 0;
    document.getElementById("notes").value = entry.notes || "";
  } else {
    data = { math:0, science:0, english:0, coding:0, social:0, music:0, chores:0 };
    for(let key in data){
      document.getElementById(key).innerText = 0;
    }
    document.getElementById("planned").value = 3;
    document.getElementById("school").value = 0;
    document.getElementById("assignment").value = 0;
    document.getElementById("notes").value = "";
  }

  update();
}
</script>

</body>
</html>
