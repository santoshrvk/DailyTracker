<!DOCTYPE html>
<html>
<head>
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 15px; }

    .form-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    label { font-weight: 500; }

    input, textarea {
      width: 100%;
      padding: 8px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h2>📅 Daily Tracker</h2>

<div class="form-row">
  <label>Date</label>
  <input type="date" id="date" onchange="loadDay()">
</div>

<div class="form-row">
  <label>Planned Hours</label>
  <input type="number" id="planned" value="3" oninput="update()">
</div>

<div class="form-row">
  <label>Attended School</label>
  <div class="radio-group">
    <label><input type="radio" name="school" value="1" onchange="update()"> Yes</label>
    <label><input type="radio" name="school" value="0" checked onchange="update()"> No</label>
  </div>
</div>

<div class="form-row">
  <label>School Assignment</label>
  <div class="radio-group">
    <label><input type="radio" name="assignment" value="1" onchange="update()"> Yes</label>
    <label><input type="radio" name="assignment" value="0" checked onchange="update()"> No</label>
  </div>
</div>

<h3>📚 Activities</h3>
<p style="font-size:12px;">Tap = +0.5h | Hold = -0.5h</p>

<div class="grid">
  <button onmousedown="startPress('math')" onmouseup="endPress('math')">Math (<span id="math">0</span>h)</button>
  <button onmousedown="startPress('science')" onmouseup="endPress('science')">Science (<span id="science">0</span>h)</button>
  <button onmousedown="startPress('english')" onmouseup="endPress('english')">English (<span id="english">0</span>h)</button>
  <button onmousedown="startPress('coding')" onmouseup="endPress('coding')">Coding (<span id="coding">0</span>h)</button>
  <button onmousedown="startPress('social')" onmouseup="endPress('social')">Social (<span id="social">0</span>h)</button>
  <button onmousedown="startPress('music')" onmouseup="endPress('music')">Music (<span id="music">0</span>h)</button>
  <button onmousedown="startPress('chores')" onmouseup="endPress('chores')">Chores (<span id="chores">0</span>h)</button>
</div>

<h3>Total Hours: <span id="total">0</span></h3>
<h3>Progress: <span id="percent">0</span>%</h3>

<div class="form-row">
  <label>Notes</label>
  <textarea id="notes"></textarea>
</div>

<br>
<button onclick="saveDay()">✅ Submit</button>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWTMzdilOwAxhOSQxCA0HxOAw1jXyA0ZPEs0Wr275Z5zTJ4ejnuzIlEccjFwJaHa6r1g/exec";

let data = {
  math:0, science:0, english:0,
  coding:0, social:0, music:0, chores:0
};

let pressTimer;
let isLongPress = false;

// default today
window.onload = function() {
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("date").value = today;
};

// long press = subtract
function startPress(type){
  isLongPress = false;
  pressTimer = setTimeout(() => {
    isLongPress = true;
    if(data[type] > 0){
      data[type] -= 0.5;
      updateUI(type);
    }
  }, 400);
}

// click = add
function endPress(type){
  clearTimeout(pressTimer);
  if(!isLongPress){
    data[type] += 0.5;
    updateUI(type);
  }
}

function updateUI(type){
  document.getElementById(type).innerText = data[type];
  update();
}

// calculate totals
function update(){
  let totalActivities = Object.values(data).reduce((a,b)=>a+b,0);

  let school = parseInt(document.querySelector('input[name="school"]:checked').value || 0);
  let planned = parseFloat(document.getElementById("planned").value) || 3;

  let total = totalActivities + (school * 2);

  document.getElementById("total").innerText = total.toFixed(1);

  let percent = planned > 0 ? (total / planned * 100).toFixed(0) : 0;
  document.getElementById("percent").innerText = percent;
}

// submit to Google Sheets
function saveDay(){
  let date = document.getElementById("date").value;
  if(!date) return alert("Select date");

  let school = parseInt(document.querySelector('input[name="school"]:checked').value || 0);
  let planned = parseFloat(document.getElementById("planned").value) || 3;

  let totalActivities = Object.values(data).reduce((a,b)=>a+b,0);
  let total = totalActivities + (school * 2);
  let percent = planned > 0 ? (total / planned * 100).toFixed(0) : 0;

  let payload = {
    date,
    planned,
    school,
    assignment: document.querySelector('input[name="assignment"]:checked').value,
    ...data,
    total,
    percent,
    notes: document.getElementById("notes").value
  };

  fetch(WEB_APP_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(payload)
  });

  alert("Submitted to Google Sheets!");
  lockForm();
}

// lock UI
function lockForm(){
  document.querySelectorAll("input, textarea").forEach(el => el.disabled = true);
  document.querySelectorAll("button").forEach(btn => btn.disabled = true);
  document.body.style.opacity = "0.6";
}
</script>

</body>
</html>
