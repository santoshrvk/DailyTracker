<!DOCTYPE html>
<html>
<head>
  <title>Family Daily Tracker</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    body{
      font-family: Arial;
      padding:15px;
      max-width:900px;
      margin:auto;
      background:#f5f7fb;
    }

    h2,h3,h4{
      text-align:center;
    }

    .card{
      background:white;
      padding:15px;
      border-radius:12px;
      margin-top:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .form-row{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    input, textarea, select{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
      box-sizing:border-box;
    }

    .radio-group{
      display:flex;
      gap:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }

    button{
      padding:14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
    }

    .main-btn{
      background:#4a6cf7;
      color:white;
    }

    .activity-btn{
      background:white;
      border:1px solid #ddd;
    }

    .progress-container{
      background:#ddd;
      border-radius:20px;
      height:22px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:green;
      transition:0.3s;
    }

    .dashboard-card{
      background:#f9f9f9;
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .note{
      font-size:12px;
      color:gray;
      text-align:center;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .logout-btn{
      background:red;
      color:white;
      padding:10px 15px;
    }

    .heatmap-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      margin-top:10px;
    }

    .heatmap-cell{
      width:100%;
      aspect-ratio:1;
      border-radius:4px;
      font-size:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
    }

    @media(max-width:600px){

      .form-row{
        grid-template-columns:1fr;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .top-bar{
        flex-direction:column;
        gap:10px;
      }
    }

  </style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="card">

  <h2>🔐 Family Login</h2>

  <div class="form-row">

    <label>User</label>

    <select id="loginUser">

      <option value="Satvik">
        🦁 Satvik
      </option>

      <option value="Samyak">
        🦄 Samyak
      </option>

      <option value="Santosh">
        👨 Santosh
      </option>

      <option value="Shweta">
        👩 Shweta
      </option>

    </select>

  </div>

  <div class="form-row">

    <label>PIN</label>

    <input
      type="password"
      id="pin"
      maxlength="4">

  </div>

  <button
    class="main-btn"
    onclick="login()"
    style="width:100%;">

    Login

  </button>

</div>

<!-- APP -->

<div id="app" style="display:none;">

  <div class="top-bar">

    <h2>
      📅 Family Daily Tracker
    </h2>

    <button
      class="logout-btn"
      onclick="logout()">

      Logout

    </button>

  </div>

  <!-- TRACKER SECTION -->

  <div class="card" id="trackerSection">

    <div class="form-row">

      <label>User</label>

      <select id="user" onchange="loadDay()">

        <option value="Satvik">
          🦁 Satvik
        </option>

        <option value="Samyak">
          🦄 Samyak
        </option>

        <option value="Santosh">
          👨 Santosh
        </option>

        <option value="Shweta">
          👩 Shweta
        </option>

      </select>

    </div>

    <div class="form-row">

      <label>Date</label>

      <input
        type="date"
        id="date"
        onchange="loadDay()">

    </div>

    <div class="form-row">

      <label>Planned Hours</label>

      <input
        type="number"
        id="planned"
        value="3"
        oninput="update()">

    </div>

    <div class="form-row">

      <label>Attended School</label>

      <div class="radio-group">

        <label>
          <input
            type="radio"
            name="school"
            value="1"
            onchange="update()">

          Yes
        </label>

        <label>
          <input
            type="radio"
            name="school"
            value="0"
            checked
            onchange="update()">

          No
        </label>

      </div>

    </div>

    <div class="form-row">

      <label>School Assignment</label>

      <div class="radio-group">

        <label>
          <input
            type="radio"
            name="assignment"
            value="1">

          Yes
        </label>

        <label>
          <input
            type="radio"
            name="assignment"
            value="0"
            checked>

          No
        </label>

      </div>

    </div>

  </div>

  <!-- ACTIVITIES -->

  <div class="card" id="activitiesSection">

    <h3>📚 Activities</h3>

    <p class="note">
      Tap = +0.5h | Hold = -0.5h
    </p>

    <div
      class="grid"
      id="activityGrid">

    </div>

  </div>

  <!-- SUMMARY -->

  <div class="card">

    <h3>
      Total Hours:
      <span id="total">0</span>
    </h3>

    <h3>
      Progress:
      <span id="percent">0</span>%
    </h3>

    <div class="progress-container">

      <div
        class="progress-bar"
        id="bar">

      </div>

    </div>

    <h3>
      🔥 Current Streak:
      <span id="streak">0</span> days
    </h3>

  </div>

  <!-- HEATMAP -->

  <div class="card">

    <h3>📈 Consistency Heatmap</h3>

    <div
      class="heatmap-grid"
      id="heatmap">

    </div>

  </div>

  <!-- NOTES -->

  <div class="card" id="notesSection">

    <div class="form-row">

      <label>Notes</label>

      <textarea
        id="notes"
        rows="4">

      </textarea>

    </div>

    <button
      class="main-btn"
      id="submitBtn"
      onclick="saveDay()"
      style="width:100%;">

      ✅ Submit

    </button>

  </div>

  <!-- DASHBOARD -->

  <div
    class="card"
    id="dashboardSection">

    <h2>
      📊 Dashboard
    </h2>

    <div id="dashboard"></div>

  </div>

</div>

<script>

const WEB_APP_URL = "";

const usersConfig = {

  Satvik:{
    pin:"1111",
    role:"kid"
  },

  Samyak:{
    pin:"2222",
    role:"kid"
  },

  Santosh:{
    pin:"3333",
    role:"parent"
  },

  Shweta:{
    pin:"4444",
    role:"parent"
  }

};

const activities = [
  "math",
  "science",
  "english",
  "coding",
  "social",
  "music",
  "chores",
  "reading",
  "exercise",
  "piano"
];

let data = {};

activities.forEach(a => data[a] = 0);

let pressTimer;
let isLongPress = false;

window.onload = function(){

  let today =
    new Date().toISOString().split('T')[0];

  document.getElementById("date").value =
    today;

  renderButtons();

  const loggedInUser =
    localStorage.getItem("loggedInUser");

  const role =
    localStorage.getItem("userRole");

  if(loggedInUser){

    document.getElementById("loginScreen").style.display =
      "none";

    document.getElementById("app").style.display =
      "block";

    const userDropdown =
      document.getElementById("user");

    userDropdown.value =
      loggedInUser;

    if(role === "kid"){

      userDropdown.disabled = true;

    } else {

      userDropdown.disabled = false;
    }

    loadDay();

    toggleParentView();
  }
};

function login(){

  const user =
    document.getElementById("loginUser").value;

  const pin =
    document.getElementById("pin").value;

  const config =
    usersConfig[user];

  if(config.pin === pin){

    localStorage.setItem("loggedInUser", user);

    localStorage.setItem("userRole", config.role);

    document.getElementById("loginScreen").style.display =
      "none";

    document.getElementById("app").style.display =
      "block";

    const userDropdown =
      document.getElementById("user");

    userDropdown.value = user;

    if(config.role === "kid"){

      userDropdown.disabled = true;

    } else {

      userDropdown.disabled = false;
    }

    loadDay();

    toggleParentView();

  } else {

    alert("Invalid PIN");
  }
}

function logout(){

  localStorage.removeItem("loggedInUser");

  localStorage.removeItem("userRole");

  location.reload();
}

function toggleParentView(){

  const role =
    localStorage.getItem("userRole");

  const isParent =
    role === "parent";

  document.getElementById("trackerSection").style.display =
    isParent ? "none" : "block";

  document.getElementById("activitiesSection").style.display =
    isParent ? "none" : "block";

  document.getElementById("notesSection").style.display =
    isParent ? "none" : "block";

  document.getElementById("submitBtn").style.display =
    isParent ? "none" : "block";
}

function renderButtons(){

  const grid =
    document.getElementById("activityGrid");

  grid.innerHTML = "";

  activities.forEach(activity => {

    const pretty =
      activity.charAt(0).toUpperCase() +
      activity.slice(1);

    grid.innerHTML += `

      <button
        class="activity-btn"
        onmousedown="startPress('${activity}')"
        onmouseup="endPress('${activity}')"
        ontouchstart="startPress('${activity}')"
        ontouchend="endPress('${activity}')">

        ${pretty}
        (<span id="${activity}">0</span>h)

      </button>

    `;
  });
}

function startPress(type){

  isLongPress = false;

  pressTimer = setTimeout(() => {

    isLongPress = true;

    if(data[type] > 0){

      data[type] -= 0.5;

      updateUI(type);
    }

  }, 400);
}

function endPress(type){

  clearTimeout(pressTimer);

  if(!isLongPress){

    data[type] += 0.5;

    updateUI(type);
  }
}

function updateUI(type){

  document.getElementById(type).innerText =
    data[type];

  update();
}

function update(){

  let totalActivities =
    Object.values(data).reduce((a,b)=>a+b,0);

  let school =
    parseInt(
      document.querySelector(
        'input[name="school"]:checked'
      ).value || 0
    );

  let planned =
    parseFloat(
      document.getElementById("planned").value
    ) || 3;

  let total =
    totalActivities + (school * 2);

  document.getElementById("total").innerText =
    total.toFixed(1);

  let percent =
    planned > 0
      ? (total / planned * 100).toFixed(0)
      : 0;

  document.getElementById("percent").innerText =
    percent;

  let bar =
    document.getElementById("bar");

  bar.style.width =
    Math.min(percent,100) + "%";

  if(percent >= 100){

    bar.style.background = "green";

  } else if(percent >= 70){

    bar.style.background = "orange";

  } else {

    bar.style.background = "red";
  }
}

function getStorageKey(){

  const user =
    document.getElementById("user").value;

  const date =
    document.getElementById("date").value;

  return `${user}_${date}`;
}

function calculateStreak(user){

  let streak = 0;

  let currentDate = new Date();

  while(true){

    let dateStr =
      currentDate.toISOString().split('T')[0];

    let key =
      `${user}_${dateStr}`;

    let saved =
      localStorage.getItem(key);

    if(saved){

      let payload =
        JSON.parse(saved);

      if(Number(payload.percent) >= 100){

        streak++;

        currentDate.setDate(
          currentDate.getDate() - 1
        );

      } else {
        break;
      }

    } else {
      break;
    }
  }

  return streak;
}

async function saveDay(){

  try{

    const btn =
      document.getElementById("submitBtn");

    btn.disabled = true;

    btn.innerText = "Saving...";

    let date =
      document.getElementById("date").value;

    if(!date){

      alert("Select date");

      return;
    }

    let user =
      document.getElementById("user").value;

    let school =
      parseInt(
        document.querySelector(
          'input[name="school"]:checked'
        ).value || 0
      );

    let planned =
      parseFloat(
        document.getElementById("planned").value
      ) || 3;

    let totalActivities =
      Object.values(data).reduce((a,b)=>a+b,0);

    let total =
      totalActivities + (school * 2);

    let percent =
      planned > 0
        ? (total / planned * 100).toFixed(0)
        : 0;

    let payload = {

      user,
      date,
      planned,
      school,

      assignment:
        document.querySelector(
          'input[name="assignment"]:checked'
        ).value,

      ...data,

      total,
      percent,

      notes:
        document.getElementById("notes").value
    };

    localStorage.setItem(
      getStorageKey(),
      JSON.stringify(payload)
    );

    let streak =
      calculateStreak(user);

    document.getElementById("streak").innerText =
      streak;

    update();

    renderHeatmap(user);

    renderDashboard();

    if(percent >= 100){

      alert(`🔥 Great job ${user}! Goal achieved!`);

    } else {

      alert(`✅ Progress saved successfully for ${user}`);
    }

  } catch(error){

    console.error(error);

    alert(
      "Error while saving. Check console."
    );

  } finally {

    const btn =
      document.getElementById("submitBtn");

    btn.disabled = false;

    btn.innerText = "✅ Submit";
  }
}

function loadDay(){

  activities.forEach(a => {

    data[a] = 0;

    if(document.getElementById(a)){
      document.getElementById(a).innerText = 0;
    }
  });

  const saved =
    localStorage.getItem(getStorageKey());

  if(saved){

    const payload =
      JSON.parse(saved);

    document.getElementById("planned").value =
      payload.planned || 3;

    document.querySelector(
      `input[name="school"][value="${payload.school}"]`
    ).checked = true;

    document.querySelector(
      `input[name="assignment"][value="${payload.assignment}"]`
    ).checked = true;

    activities.forEach(a => {

      data[a] = payload[a] || 0;

      if(document.getElementById(a)){
        document.getElementById(a).innerText =
          data[a];
      }
    });

    document.getElementById("notes").value =
      payload.notes || "";

  } else {

    document.getElementById("notes").value = "";
  }

  const user =
    document.getElementById("user").value;

  let streak =
    calculateStreak(user);

  document.getElementById("streak").innerText =
    streak;

  update();

  renderHeatmap(user);

  renderDashboard();
}

function renderHeatmap(user){

  let html = "";

  let recentDays = [];

  for(let key in localStorage){

    if(key.startsWith(user + "_")){

      let payload =
        JSON.parse(localStorage.getItem(key));

      recentDays.push({
        date: payload.date,
        percent: Number(payload.percent || 0)
      });
    }
  }

  recentDays.sort((a,b) =>
    new Date(a.date) - new Date(b.date)
  );

  recentDays.slice(-35).forEach(day => {

    let color = "#ccc";

    if(day.percent >= 100){

      color = "green";

    } else if(day.percent >= 70){

      color = "orange";

    } else if(day.percent > 0){

      color = "red";
    }

    html += `

      <div
        class="heatmap-cell"
        style="background:${color};">

        ${new Date(day.date).getDate()}

      </div>

    `;
  });

  document.getElementById("heatmap").innerHTML =
    html;
}

function renderDashboard(){

  const role =
    localStorage.getItem("userRole");

  const loggedInUser =
    localStorage.getItem("loggedInUser");

  let dashboardUsers = [];

  if(role === "parent"){

    dashboardUsers = [
      "Satvik",
      "Samyak"
    ];

  } else {

    dashboardUsers = [
      loggedInUser
    ];
  }

  let html = "";

  dashboardUsers.forEach(user => {

    let totalHours = 0;

    let completedDays = 0;

    let trackedDays = 0;

    let totalPercent = 0;

    let recentDays = [];

    for(let key in localStorage){

      if(key.startsWith(user + "_")){

        let payload =
          JSON.parse(localStorage.getItem(key));

        trackedDays++;

        totalHours += Number(payload.total || 0);

        totalPercent += Number(payload.percent || 0);

        if(Number(payload.percent) >= 100){

          completedDays++;
        }

        recentDays.push({
          date: payload.date,
          percent: Number(payload.percent || 0)
        });
      }
    }

    recentDays.sort((a,b) =>
      new Date(b.date) - new Date(a.date)
    );

    let recentHtml = "";

    recentDays.slice(0,7).forEach(day => {

      let color = "red";

      if(day.percent >= 100){
        color = "green";
      }
      else if(day.percent >= 70){
        color = "orange";
      }

      recentHtml += `

        <div style="
          display:flex;
          justify-content:space-between;
          padding:4px 0;
          border-bottom:1px solid #eee;
        ">

          <span>${day.date}</span>

          <span style="
            color:${color};
            font-weight:bold;
          ">
            ${day.percent}%
          </span>

        </div>

      `;
    });

    let avgPercent =
      trackedDays > 0
        ? (totalPercent / trackedDays).toFixed(0)
        : 0;

    let streak =
      calculateStreak(user);

    html += `

      <div class="dashboard-card">

        <h3>
          👤 ${user}
        </h3>

        <p>
          🔥 Current Streak:
          <b>${streak}</b>
        </p>

        <p>
          📅 Total Tracked Days:
          <b>${trackedDays}</b>
        </p>

        <p>
          ⏱ Total Hours:
          <b>${totalHours.toFixed(1)}</b>
        </p>

        <p>
          ✅ Goal Achieved Days:
          <b>${completedDays}</b>
        </p>

        <p>
          📊 Average Completion:
          <b>${avgPercent}%</b>
        </p>

        <h4 style="margin-top:15px;">
          Last 7 Days
        </h4>

        ${recentHtml || "No data yet"}

      </div>

    `;
  });

  document.getElementById("dashboard").innerHTML =
    html;
}

</script>

</body>
</html>
```
