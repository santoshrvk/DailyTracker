<!DOCTYPE html>
<html>
<head>
  <title>Daily Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 15px; }

    .form-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    label {
      font-weight: 500;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h2>📅 Daily Tracker</h2>

<!-- Date -->
<div class="form-row">
  <label>Date</label>
  <input type="date" id="date" onchange="loadDay()">
</div>

<!-- Planned -->
<div class="form-row">
  <label>Planned Hours</label>
  <input type="number" id="planned" value="3" oninput="update()">
</div>

<!-- School -->
<div class="form-row">
  <label>Attended School</label>
  <div class="radio-group">
    <label><input type="radio" name="school" value="1" onchange="update()"> Yes</label>
    <label><input type="radio" name="school" value="0" checked onchange="update()"> No</label>
  </div>
</div>

<!-- Assignment -->
<div class="form-row">
  <label>School Assignment</label>
  <div class="radio-group">
    <label><input type="radio" name="assignment" value="1" onchange="update()"> Yes</label>
    <label><input type="radio" name="assignment" value="0" checked onchange="update()"> No</label>
  </div>
</div>

<h3>📚 Activities</h3>
<p style="font-size:12px;">Tap = +0.5h | Hold = -0.5h</p>

<div class="grid">
  <button onmousedown="startPress('math')" onmouseup="endPress('math')">Math (<span id="math">0</span>h)</button>
  <button onmousedown="startPress('science')" onmouseup="endPress('science')">Science (<span id="science">0</span>h)</button>
  <button onmousedown="startPress('english')" onmouseup="endPress('english')">English (<span id="english">0</span>h)</button>
  <button onmousedown="startPress('coding')" onmouseup="endPress('coding')">Coding (<span id="coding">0</span>h)</button>
  <button onmousedown="startPress('social')" onmouseup="endPress('social')">Social (<span id="social">0</span>h)</button>
  <button onmousedown="startPress('music')" onmouseup="endPress('music')">Music (<span id="music">0</span>h)</button>
  <button onmousedown="startPress('chores')" onmouseup="endPress('chores')">Chores (<span id="chores">0</span>h)</button>
</div>

<h3>Total Hours: <span id="total">0</span></h3>
<h3>Progress: <span id="percent">0</span>%</h3>

<!-- Notes -->
<div class="form-row">
  <label>Notes</label>
  <textarea id="notes"></textarea>
</div>

<br>
<button onclick="saveDay()">✅ Submit</button>

<script>
let data = {
  math:0, science:0, english:0,
  coding:0, social:0, music:0, chores:0
};

let pressTimer;
let isLongPress = false;

// Default today
window.onload = function() {
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("date").value = today;
  loadDay();
};

// Long press = subtract
function startPress(type){
  isLongPress = false;

  pressTimer = setTimeout(() => {
    isLongPress = true;
    if(data[type] > 0){
      data[type] -= 0.5;
      updateUI(type);
    }
  }, 400);
}

// Click = add
function endPress(type){
  clearTimeout(pressTimer);

  if(!isLongPress){
    data[type] += 0.5;
    updateUI(type);
  }
}

function updateUI(type){
  if(data[type] < 0) data[type] = 0;
  document.getElementById(type).innerText = data[type];
  update();
}

// Calculate totals
function update(){
  let activityTotal = 0;
  for(let key in data){
    activityTotal += data[key];
  }

  let school = parseInt(document.querySelector('input[name="school"]:checked').value || 0);
  let planned = parseFloat(document.getElementById("planned").value) || 3;

  let total = activityTotal + (school * 2);

  document.getElementById("total").innerText = total.toFixed(1);

  let percent = planned > 0 ? (total / planned * 100).toFixed(0) : 0;
  document.getElementById("percent").innerText = percent;
}

// Save + lock
function saveDay(){
  let date = document.getElementById("date").value;
  if(!date) return;

  let school = parseInt(document.querySelector('input[name="school"]:checked').value || 0);
  let planned = parseFloat(document.getElementById("planned").value) || 3;

  let activityTotal = 0;
  for(let key in data){
    activityTotal += data[key];
  }

  let total = activityTotal + (school * 2);
  let percent = planned > 0 ? (total / planned * 100).toFixed(0) : 0;

  let payload = {
    date: date,
    planned: planned,
    school: school,
    assignment: document.querySelector('input[name="assignment"]:checked').value,
    ...data,
    total: total,
    percent: percent,
    notes: document.getElementById("notes").value
  };

  fetch("PASTE_YOUR_WEB_APP_URL_HERE", {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(res => res.text())
  .then(() => {
    alert("Submitted to Google Sheets!");
    lockForm();
  })
  .catch(err => {
    alert("Error saving data");
    console.error(err);
  });
}

// Lock UI
function lockForm(){
  document.querySelectorAll("input, textarea").forEach(el => el.disabled = true);

  document.querySelectorAll("button").forEach(btn => {
    btn.disabled = true;
    btn.style.backgroundColor = "#ccc";
    btn.style.color = "#666";
  });

  document.body.style.opacity = "0.6";

  let msg = document.createElement("h3");
  msg.innerText = "✅ Submitted (Locked)";
  msg.style.color = "green";
  document.body.appendChild(msg);
}

// Load saved day
function loadDay(){
  let date = document.getElementById("date").value;
  if(!date) return;

  let saved = localStorage.getItem("tracker-" + date);

  if(saved){
    let entry = JSON.parse(saved);
    data = entry.data;

    for(let key in data){
      document.getElementById(key).innerText = data[key];
    }

    document.getElementById("planned").value = entry.planned || 3;

    document.querySelector(`input[name="school"][value="${entry.school}"]`).checked = true;
    document.querySelector(`input[name="assignment"][value="${entry.assignment}"]`).checked = true;

    document.getElementById("notes").value = entry.notes || "";

    lockForm();
  } else {
    data = { math:0, science:0, english:0, coding:0, social:0, music:0, chores:0 };

    for(let key in data){
      document.getElementById(key).innerText = 0;
    }

    document.getElementById("planned").value = 3;
    document.querySelector('input[name="school"][value="0"]').checked = true;
    document.querySelector('input[name="assignment"][value="0"]').checked = true;
    document.getElementById("notes").value = "";

    document.querySelectorAll("input, textarea, button").forEach(el => el.disabled = false);
    document.body.style.opacity = "1";
  }

  update();
}
</script>

</body>
</html>
